<!DOCTYPE html>
<html>
  <head>
    <title>Performance Tracking</title>
    <link rel="stylesheet" href="css/performance-tracking.css" />
    <script src="js/performance-tracking.js"></script>
  </head>

  <body>
    
    <div class="logo">
      <div><img class="logo-pic" src="images/logo.png" alt=""></div>
      <h3 class="account-login">Account Login</h3>
    </div>

    <div class="title">
      <h1 class="ppt-title">Player Performance Tracking</h1>
    </div>
    
    <div class="video-player">
      <img class="direct-picture" src="images/rooney.webp" alt="rooney" />
    </div>

    <div class="player-search">
      <input class="input-player-search" placeholder="Player search..." />
      <button class="add-player">+</button>
    </div>

    <div class="bottom-nav">
      <div class="video-clips">
        <div class="clip-button">
          <button class="clip-button-css">
            Clip Video +
          </button>
        </div>
        <div class="clip-savings">
          <div class="clips"></div>
          <div class="clips"></div>
          <div class="clips"></div>
        </div>
      </div>

      <div class="player-action">
      </div>

      <div class="notes">
        <input class="input-notes" class="input-notes-js" placeholder="Add notes..." onclick="notesCollection">
      </div>
    </div>
      
  </body>
</html>
