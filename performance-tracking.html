<!DOCTYPE html>
<html>
  <head>
    <title>Performance Tracking</title>
    <link rel="stylesheet" href="css/performance-tracking.css" />
  </head>

  <body>
    <!-- Header Section -->
    <div class="header-section">
      <h1 class="header-title"> Davidson Data</h1>
    </div>

    <!-- Main media player section -->
     <div class="main-media-player">
      <div class="media-player"><img id="media-player-image" src="images/BHHS logo.jpg" alt="Green & Gold BH Hawk"></div>
     </div>

    <!--Action Panel-->
    <div class="action-panel">
      <!--First third of bottom section-->
      <div class="video-clips-section">
        <div class="video-clips-edit">
         <input class="video-clips-edit-input" placeholder="Video Clips Edit">
        </div>
        <div class="video-clips-saved">
          <video class="saved-clips">Saved Clips</video>
        </div>
      </div>

      <!--Second third of bottom section-->
      <div class="player-actions">
        <div class="pa-input">
          <input type="text" placeholder="Search Teams..." id="pa-input-button">
        </div>
        <div class="pa-team">
          <h1 class="pa-team-name">Bishop Hendricken High School</h1>
        </div>
        <div class="pa-action-buttons">
          <div class="pa-action-buttons-offense">
            <h3 class="pa-action-button-titles">Offense</h3>
            <div class="pa-buttons"><h5>Dribble</h5><button class="pa-action-buttons-stats">+</button><button class="pa-action-buttons-stats">-</button> <p>0%</p></div>
            <div class="pa-buttons"><h5>Pass</h5><button class="pa-action-buttons-stats">+</button><button class="pa-action-buttons-stats">-</button> <p>0%</p></div>
            <div class="pa-buttons"><h5>Cross</h5><button class="pa-action-buttons-stats">+</button><button class="pa-action-buttons-stats">-</button> <p>0%</p></div>
            <div class="pa-buttons"><h5>Shot</h5><button class="pa-action-buttons-stats">+</button><button class="pa-action-buttons-stats">-</button> <p>0%</p></div>
          </div>
          <div class="pa-action-buttons-defense">
            <h3 class="pa-action-button-titles">Defense</h3>
            <div class="pa-buttons"><h5>Tackle</h5><button class="pa-action-buttons-stats">+</button><button class="pa-action-buttons-stats">-</button> <p>0%</p></div>
            <div class="pa-buttons"><h5>Slide Tackle</h5><button class="pa-action-buttons-stats">+</button><button class="pa-action-buttons-stats">-</button> <p>0%</p></div>
            <div class="pa-buttons"><h5>Interception</h5><button class="pa-action-buttons-stats">+</button><button class="pa-action-buttons-stats">-</button> <p>0%</p></div>
            <div class="pa-buttons"><h5>Cleareance</h5><button class="pa-action-buttons-stats">+</button><button class="pa-action-buttons-stats">-</button> <p>0%</p></div>
          </div>
          <div class="pa-action-buttons-key">
            <h3 class="pa-action-button-titles">Key Plays</h3>
            <div class="pa-buttons"><h5>Key Pass</h5><button class="pa-action-buttons-stats">+</button><button class="pa-action-buttons-stats">-</button> <p>0%</p></div>
            <div class="pa-buttons"><h5>xG</h5><button class="pa-action-buttons-stats">+</button><button class="pa-action-buttons-stats">-</button> <p>0%</p></div>
            <div class="pa-buttons"><h5>xA</h5><button class="pa-action-buttons-stats">+</button><button class="pa-action-buttons-stats">-</button> <p>0%</p></div>
            <div class="pa-buttons"><h5>Foul</h5><button class="pa-action-buttons-stats">+</button><button class="pa-action-buttons-stats">-</button> <p>0%</p></div>
          </div>
        </div>
      </div>

      <!--Final third of bottom section-->
      <div class="notes-section">
        <textarea id="notes-section-input" placeholder="Soccer notes..."></textarea>
        <ul id="notes-section-list"></ul>
      </div>
    </div>

    <script src="js/performance-tracking.js"></script>
  </body>
</html>
