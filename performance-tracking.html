<!DOCTYPE html>
<html>
  <head>
    <title>Performance Tracking</title>
    <link rel="stylesheet" href="css/performance-tracking.css" />
  </head>

  <body>
    <!-- Header Section -->
    <div class="header-section">
      <h1> Davidson Data</h1>
    </div>

    <!-- Main media player section -->
     <div class="main-media-player">
      <div class="media-player">Media Player</div>
     </div>

    <!--Action Panel-->
    <div class="action-panel">
      <!--First third of bottom section-->
      <div class="video-clips-section">
        <div class="video-clips-edit">
         <input class="video-clips-edit-input" placeholder="Video Clips Edit">
        </div>
        <div class="video-clips-saved">
          <video class="saved-clips">Saved Clips</video>
        </div>
      </div>

      <!--Second third of bottom section-->
      <div class="player-actions">
        <div class="pa-input">
          <input type="text" placeholder="Search Teams..." id="pa-input-button">
        </div>
        <div class="pa-team">
          <h1 class="pa-team-name">Bishop Hendricken High School</h1>
        </div>
        <div class="pa-action-buttons">
          <div class="pa-action-buttons-offense">
            <div class="pa-buttons"><button>Dribble</button> <p></p></div>
            <div class="pa-buttons"><button>Pass</button> <p></p></div>
            <div class="pa-buttons"><button>Cross</button> <p></p></div>
            <div class="pa-buttons"><button>Shot</button> <p></p></div>
          </div>
          <div class="pa-action-buttons-defense">
            <div class="pa-buttons"><button>Tackle</button> <p></p></div>
            <div class="pa-buttons"><button>Interception</button> <p></p></div>
            <div class="pa-buttons"><button>Cleareance</button> <p></p></div>
          </div>
          <div class="pa-action-buttons-key">
            <div class="pa-buttons"><button>Key Pass</button> <p></p></div>
            <div class="pa-buttons"><button>xG</button> <p></p></div>
            <div class="pa-buttons"><button>xA</button> <p></p></div>
            <div class="pa-buttons"><button>Foul</button> <p></p></div>
          </div>
        </div>
      </div>

      <!--Final third of bottom section-->
      <div class="notes-section">
        <div class="notes-section-input">
          <textarea class="notes-section-textarea" placeholder="Write notes here"></textarea>
        </div>
        <ul id="notes-storage">Notes Storage</ul>
      </div>
    </div>

    <script src="js/performance-tracking.js"></script>
  </body>
</html>
