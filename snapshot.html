<!DOCTYPE html>
<html>
  <head>
    <title>Performance Tracking</title>
    <link rel="stylesheet" href="css/snapshot.css" />
  </head>

  <body>
    <!-- Header Section -->
    <div class="header-section">
      <h1 class="header-title"> Davidson Data</h1>
    </div>

    <!-- Main media player section -->
    <div class="main-media-player">
      <div class="media-player"><img id="media-player-image" src="images/BHHS-logo.jpg" alt="Green & Gold BH Hawk"></div>
    </div>

    <!--Portal-->
    <div id="snapshot" >
      <!--Return Btn-->
      <div id="snapshot-portal">
        <button id="portal-btn">Portal</button>
      </div>

      <!--Editing Section-->
      <div id="snapshot-main">

        <!--Video editing section-->
        <div id="snapshot-video">
          <div class="container">
            <h1>Video Clipper</h1>
            <video id="main-video" controls>
                <source src="your-video.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
            <br>
            <button id="clip-btn">Clip Last 5 Seconds</button>
        </div>
    
        <div class="clip-container" id="clips"></div>
        </div>

        <!--Notes editing section-->
        <div id="snapshot-notes"> 
          
        </div>
      </div>
    </div>

    


    <script src="js/snapshot.js"></script>
  </body>
</html>
