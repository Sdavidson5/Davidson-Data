<!DOCTYPE html>
<html>
  <head>
    <title>Performance Tracking</title>
    <link rel="stylesheet" href="css/performance-tracking.css" />
  </head>

  <body>
    <!-- Top section with the menu and login sections-->
    <div class="top-section">
      <div class="logo-container">
        <img class="logo-pic" src="images/logo.png" alt="" />
      </div>
      <h1 class="ppt-title">Player Performance Tracking</h1>
      <h3 class="account-login">Account Login</h3>
    </div>
    <!-- Middle section where I will link the video player-->
    <div class="middle-section">
      <div class="video-player">Video Player</div>
    </div>
    <!--Bottom section divided into thirds for clips, action buttons, and notes section-->
    <div class="bottom-section">
      <div class="video-clips">
        <div class="clip-button">
          <button class="clip-button-css">
            Clip Video + 
          </button>
        </div>
        <div class="clip-savings">
          <div class="clips"></div>
          <div class="clips"></div>
          <div class="clips"></div>
        </div>
      </div>

      <div class="player-actions">
        <div class="player-search">
          <input class="input-player-search" placeholder="Player search..." />
          <button class="add-player">+</button>
        </div>
        <div class="action-buttons">
          <div class="column-1"></div>
          <div class="column-2"></div>
          <div class="column-3"></div>
        </div>
      </div>

      

      <div class="notes">
        <h3 class="notes-title"> Notes</h3>
        <div class="adding-notes">
            <Input class="notes-button" placeholder="Add Notes...">
        </div>
        <div class="stored-note"> 
          <h4 class="stored-notes-title">Stored Notes</h4>
          <div class="stored-notes">Notes</div>
        </div>
      </div>
    </div>
    <script src="js/performance-tracking.js"></script>
  </body>
</html>
